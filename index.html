<!DOCTYPE html>
<html>
    <head>
        <meta charset="UTF-8">
        <title>New Tab || stickytab by kpoovakan</title>
        <link rel="shortcut icon" type="image/png" href="favicon.png">
        <link rel="preconnect" href="https://fonts.googleapis.com">
        <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
        <link href="https://fonts.googleapis.com/css2?family=Oregano:ital@0;1&display=swap" rel="stylesheet">
        <link rel="stylesheet" type="text/css" href="style.css">
        <script src="script.js"></script>
    </head>
    <body>
        <iframe src="components/stickies.html" class="stickies"></iframe>
        <div class="info">
            <div style="display: block;">
                <p id="date" class="date">today's date</p>
                <p id="time" class="time">time</p>
                <p id="checkJavaScript">If you would like to use Stickytab, you must enable JavaScript.</p>
                <input class="webpage" type="search" id="webpage" name="webpage" autocomplete="off" onclick="this.select()" placeholder="use your enter key to open webpage" onchange="webpage(this)" autofocus /></input> <!-- oninput -->
                <div class="searchgrid">
                    <input class="websearch" type="search" id="websearch" name="websearch" autocomplete="off" onclick="this.select()" placeholder="use your enter key to search the web" onchange="websearch(this)" /></input> <!-- oninput -->
                    <select id="searchoption" class="searchoption" onchange="searchOption()">
                        <option value="DuckDuckGo" selected>DuckDuckGo</option>
                        <option value="Google">Google</option>
                        <option value="Bing">Bing</option>
                    </select>
                </div>
                <iframe src="components/calculator.html" class="calculator"></iframe>
            </div>
        </div>
        <div class="components">
            <div class="siteList">
                <table id="siteList" width="100%;" style="border-collapse: collapse;"></table>
            </div>
            <p>Everyday, I see the quick brown fox jump over the lazy dog.</p>
        </div>
        <dialog id="editSites">
            <div style="display: flex;">
                <div class="editSitesSpacer"></div>
                <div class="editSitesContent">
                    <p class="editSitesHeader">add a site</p>
                    <input type="text" class="editSitesInput" id="addSite" name="addSite" autocomplete="off" onclick="this.select()" onchange="storageAdd(this.value)" placeholder="press enter to add site.."></input>
                    <p>you must include the http or https at the beginning of the site url.</p>
                </div>
                <div class="editSitesSpacer"></div>
                <div class="editSitesContent">
                    <p class="editSitesHeader">remove a site</p>
                    <div class="siteList">
                        <table id="editSitesList" width="100%;" style="border-collapse: collapse; font-size: 2vh;"></table>
                    </div>
                </div>
                <div class="editSitesSpacer"></div>
            </div>
            <button class="closeDialog" onclick="closeDialog()">save changes and close</button>
        </dialog>
        <script src="storage.js"></script>
    </body>
</html>
